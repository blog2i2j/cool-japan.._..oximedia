[package]
name = "oximedia-transcode"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "High-level transcoding pipeline for OxiMedia"

[lints]
workspace = true

[features]
default = ["mjpeg", "apv"]
## Enable MJPEG (Motion JPEG) intra-frame codec via `make_video_encoder`.
mjpeg = ["oximedia-codec/mjpeg"]
## Enable APV (Advanced Professional Video) intra-frame codec via `make_video_encoder`.
apv = ["oximedia-codec/apv"]

[dependencies]
oximedia-core = { workspace = true }
oximedia-codec = { workspace = true }
oximedia-container = { workspace = true }
oximedia-io = { workspace = true }
oximedia-graph = { workspace = true }
oximedia-metering = { workspace = true }
oximedia-subtitle = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
bytes = { workspace = true }
rayon = { workspace = true }
tracing = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
oximedia-audio = { workspace = true }
async-trait = { workspace = true }
