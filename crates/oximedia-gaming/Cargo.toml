[package]
name = "oximedia-gaming"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
description = "Game streaming and screen capture optimization for OxiMedia"
readme = "README.md"
homepage.workspace = true
repository.workspace = true
keywords = ["game", "streaming", "capture", "screen", "recording"]
categories = ["multimedia", "game-engines"]

[lints]
workspace = true

[dependencies]
oximedia-core = { workspace = true }
oximedia-codec = { workspace = true, default-features = true }
oximedia-audio = { workspace = true }
oximedia-graph = { workspace = true }
thiserror = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true }

[dev-dependencies]

[lib]
name = "oximedia_gaming"
path = "src/lib.rs"
