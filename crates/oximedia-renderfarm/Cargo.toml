[package]
name = "oximedia-renderfarm"
description = "Distributed render farm management and job scheduling"
keywords = ["workflow", "batch", "processing", "multimedia", "pipeline"]
categories = ["multimedia", "algorithms"]
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[dependencies]
# Workspace dependencies
tokio = { workspace = true }
thiserror = { workspace = true }
bytes = { workspace = true }
bitflags = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
rand = { workspace = true }
rusqlite = { workspace = true }
r2d2 = { workspace = true }
r2d2_sqlite = { workspace = true }
dashmap = { workspace = true }
parking_lot = { workspace = true }
uuid = { workspace = true }
prometheus = { workspace = true }

# Internal dependencies
oximedia-core = { workspace = true }
oximedia-farm = { workspace = true }
oximedia-timeline = { workspace = true }
oximedia-vfx = { workspace = true }
oximedia-cloud = { workspace = true }
oximedia-monitor = { workspace = true }
oximedia-storage = { workspace = true }
oximedia-distributed = { workspace = true }
oximedia-net = { workspace = true }

# Additional dependencies
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
hyper = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
futures = "0.3"
futures-util = "0.3"
tokio-stream = "0.1"
tokio-util = { version = "0.7", features = ["codec"] }
blake3 = "1.8"
sha2 = { workspace = true }
lz4_flex = { workspace = true }
oxiarc-zstd = { workspace = true }
walkdir = "2"
notify = "8"
crossbeam-channel = { workspace = true }
crossbeam = "0.8"
num_cpus = "1.17"
sysinfo = "0.38"

[dev-dependencies]
tempfile.workspace = true
criterion = { workspace = true }

[[bench]]
name = "scheduler"
harness = false
