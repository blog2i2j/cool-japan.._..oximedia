[package]
name = "oximedia-cv"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Computer vision for OxiMedia"
keywords = ["computer-vision", "video", "tracking", "multimedia", "image"]
categories = ["multimedia::images", "multimedia", "science"]
readme = "README.md"

[lints]
workspace = true

[features]
default = []
onnx = ["dep:oxionnx"]
cuda = ["onnx", "oxionnx/cuda"]
rocm = ["onnx"]
tensorrt = ["onnx"]

[dependencies]
oximedia-core = { workspace = true }
oximedia-codec = { workspace = true, default-features = true }
thiserror = { workspace = true }
oxionnx = { workspace = true, optional = true }
ndarray = { workspace = true }
bytes = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true }
oxifft = { workspace = true }
