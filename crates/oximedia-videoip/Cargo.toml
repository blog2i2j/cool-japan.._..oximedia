[package]
name = "oximedia-videoip"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Professional video-over-IP protocol for OxiMedia (patent-free NDI alternative)"

[lints]
workspace = true

[dependencies]
# Workspace dependencies
oximedia-core = { workspace = true }
oximedia-codec = { workspace = true, default-features = true }
oximedia-net = { workspace = true }
oximedia-monitor = { workspace = true }
oximedia-timecode = { workspace = true }
tokio = { workspace = true, features = ["full"] }
thiserror = { workspace = true }
bytes = { workspace = true }
bitflags = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }

# Networking
socket2 = "0.6"

# mDNS/DNS-SD for service discovery
mdns-sd = "0.18"

# Forward Error Correction
reed-solomon-erasure = "6.0"

# Compression (optional, for compressed video formats)
flate2 = { workspace = true }

# Performance
crossbeam = "0.8"
flume = "0.12"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
criterion = "0.5"

[features]
default = []
hw-accel = []
