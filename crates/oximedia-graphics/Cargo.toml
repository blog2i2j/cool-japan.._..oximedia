[package]
name = "oximedia-graphics"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Broadcast graphics engine for OxiMedia"
readme = "README.md"

[lints]
workspace = true

[dependencies]
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
rayon.workspace = true
rand.workspace = true
oximedia-core.workspace = true
oximedia-image.workspace = true

# Graphics rendering
tiny-skia = "0.12"
fontdue = "0.9"
ab_glyph = "0.2"
kurbo = "0.13"
palette = "0.7"

# GPU rendering
wgpu = { version = "29", optional = true }
bytemuck = { version = "1", features = ["derive"] }
pollster = { version = "0.4", optional = true }

# Template and control
tera = "1"

# getrandom v0.2 (via palette -> phf -> rand 0.8) requires "js" feature on wasm32
# getrandom v0.4 (via rand 0.10) requires "wasm_js" feature on wasm32
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom02 = { workspace = true }
getrandom = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, optional = true }
axum = { version = "0.8", optional = true }

[features]
default = ["gpu", "server"]
gpu = ["dep:wgpu", "dep:pollster"]
server = ["dep:tokio", "dep:axum"]

[dev-dependencies]
criterion = { workspace = true }
tempfile.workspace = true
