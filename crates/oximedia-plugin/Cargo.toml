[package]
name = "oximedia-plugin"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Plugin system for OxiMedia - dynamic codec loading"
readme = "README.md"
keywords = ["media", "plugin", "codec", "dynamic"]
categories = ["multimedia", "multimedia::encoding"]

[lints]
workspace = true

[dependencies]
oximedia-core.workspace = true
oximedia-codec = { workspace = true, default-features = false }
thiserror.workspace = true
tracing.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[features]
default = []
dynamic-loading = ["libloading"]

[dependencies.libloading]
version = "0.9"
optional = true

[dev-dependencies]
tempfile.workspace = true
