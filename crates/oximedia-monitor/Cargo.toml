[package]
name = "oximedia-monitor"
description = "Real-time media pipeline monitoring and health checking"
keywords = ["monitoring", "pipeline", "health", "multimedia", "broadcast"]
categories = ["multimedia", "development-tools"]
readme = "README.md"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# Workspace dependencies
oximedia-core = { workspace = true, optional = true }
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
tracing = { workspace = true }
rayon = { workspace = true }
bytes = { workspace = true }
async-trait = { workspace = true }

# Additional dependencies for monitoring
parking_lot = { workspace = true }
dashmap = { workspace = true }
flume = "0.12"
crossbeam = "0.8"
regex = "1"
once_cell = "1"
anyhow = "1"
futures = "0.3"
futures-util = "0.3"
nvml-wrapper = { version = "0.12", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, features = ["full"] }
rusqlite = { workspace = true, optional = true }
sysinfo = "0.38"
axum = { version = "0.8", features = ["ws", "macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
hyper = { workspace = true }
reqwest = { workspace = true }
lettre = { version = "0.11", default-features = false, features = ["tokio1", "tokio1-rustls-tls", "builder", "smtp-transport"], optional = true }
http-body-util = { workspace = true }

[dev-dependencies]
tempfile.workspace = true
mockito = "1"

[features]
default = []
gpu = ["nvml-wrapper"]
integrations = ["oximedia-core"]
email = ["lettre"]
sqlite = ["rusqlite"]
full = ["gpu", "integrations", "email", "sqlite"]

[[test]]
name = "integration"
path = "tests/integration.rs"
