[package]
name = "oximedia-monitor"
description = "Real-time media pipeline monitoring and health checking"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
# Workspace dependencies
oximedia-core = { workspace = true, optional = true }
tokio = { workspace = true, features = ["full"] }
thiserror = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
tracing = { workspace = true }
rayon = { workspace = true }
bytes = { workspace = true }
async-trait = { workspace = true }

# Additional dependencies for monitoring
rusqlite = { workspace = true }
sysinfo = "0.36"
axum = { version = "0.8", features = ["ws", "macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }
hyper = { workspace = true }
reqwest = { workspace = true }
lettre = { version = "0.11", default-features = false, features = ["tokio1", "tokio1-rustls-tls", "builder", "smtp-transport"] }
parking_lot = { workspace = true }
dashmap = { workspace = true }
flume = "0.12"
crossbeam = "0.8"
regex = "1"
once_cell = "1"
anyhow = "1"
futures = "0.3"
futures-util = "0.3"
http-body-util = { workspace = true }
nvml-wrapper = { version = "0.12", optional = true }

[dev-dependencies]
tempfile = "3"
mockito = "1"

[features]
default = []
gpu = ["nvml-wrapper"]
integrations = ["oximedia-core"]
full = ["gpu", "integrations"]

[[test]]
name = "integration"
path = "tests/integration.rs"
