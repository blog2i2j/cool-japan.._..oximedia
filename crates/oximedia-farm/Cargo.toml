[package]
name = "oximedia-farm"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
authors.workspace = true
description = "Distributed encoding farm coordinator for OxiMedia - production-grade job management and worker coordination"

[lints]
workspace = true

[dependencies]
# Core async runtime
tokio = { workspace = true, features = ["full"] }
async-trait.workspace = true

# Error handling
thiserror.workspace = true

# Logging and tracing
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }

# gRPC and serialization
tonic = { workspace = true }
tonic-prost = "0.14"
prost = { workspace = true }
prost-types = { workspace = true }

# Database
rusqlite = { workspace = true }
r2d2 = { workspace = true }
r2d2_sqlite = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_yaml_ng.workspace = true
toml.workspace = true

# Base64 (for email AUTH PLAIN encoding)
base64.workspace = true

# Time handling
chrono = { workspace = true, features = ["serde"] }

# UUID generation
uuid = { workspace = true }

# Concurrency utilities
dashmap = { workspace = true }
parking_lot = { workspace = true }

# System information
num_cpus = "1.17"
hostname = "0.4"
sysinfo = "0.38"

# Network utilities
bytes.workspace = true

# Metrics and monitoring
prometheus = { workspace = true }

# Random number generation
rand.workspace = true

# Cryptographic hashing
sha2.workspace = true

# Configuration
config = "0.15"

# TLS support
tokio-rustls = { workspace = true }
rustls = { workspace = true }
rustls-pemfile = "2.2.0"

# Internal dependencies
oximedia-core.workspace = true
oximedia-codec.workspace = true
oximedia-io.workspace = true
oximedia-transcode.workspace = true
oximedia-qc.workspace = true

[build-dependencies]
tonic-build = "0.14"
tonic-prost-build = "0.14"

[features]
sqlite = []

[dev-dependencies]
tempfile = "3.27"
tokio = { workspace = true, features = ["test-util"] }
