[package]
name = "oximedia-workflow"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Comprehensive workflow orchestration engine for OxiMedia"
keywords = ["workflow", "batch", "processing", "multimedia", "pipeline"]
categories = ["multimedia", "algorithms"]
readme = "README.md"

[lints]
workspace = true

[features]
default = []
sqlite = ["rusqlite", "r2d2", "r2d2_sqlite"]

[dependencies]
# Async runtime
async-trait = { workspace = true }
futures = "0.3"

# Error handling
thiserror = { workspace = true }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = "0.9"

# Time and scheduling
chrono = { workspace = true, features = ["serde"] }
cron = "0.16"

# Logging and tracing
tracing = { workspace = true }

# UUID generation
uuid = { workspace = true }

# URL parsing
url = { version = "2.5", features = ["serde"] }

# Collections
indexmap = { version = "2.14", features = ["serde"] }
dashmap = { workspace = true }

# Concurrency
parking_lot = { workspace = true }

# CLI
clap = { workspace = true, features = ["derive"] }

# getrandom v0.2 (via cron -> phf -> rand 0.8) requires "js" feature on wasm32
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom02 = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true, features = ["full"] }
rusqlite = { workspace = true, optional = true }
r2d2 = { workspace = true, optional = true }
r2d2_sqlite = { workspace = true, optional = true }
tracing-subscriber = "0.3"
axum = { version = "0.8", features = ["ws", "macros"] }
tower = "0.5"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
