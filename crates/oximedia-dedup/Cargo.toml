[package]
name = "oximedia-dedup"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Media deduplication and duplicate detection for OxiMedia"
keywords = ["deduplication", "multimedia", "video", "fingerprint", "detection"]
categories = ["multimedia", "algorithms"]
readme = "README.md"

[lints]
workspace = true

[features]
default = []
sqlite = ["sqlx"]

[dependencies]
oximedia-core.workspace = true
oximedia-cv.workspace = true
oximedia-audio.workspace = true
blake3 = "1.8"
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true, features = ["macros"], optional = true }
tokio = { workspace = true }
thiserror.workspace = true
rayon.workspace = true
bytes.workspace = true
oxifft = { workspace = true }

[dev-dependencies]
tempfile.workspace = true
