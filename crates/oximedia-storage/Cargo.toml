[package]
name = "oximedia-storage"
version.workspace = true
edition = "2021"
authors = ["OxiMedia Contributors"]
description = "Cloud storage abstraction for S3, Azure Blob, and Google Cloud Storage"
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
futures = "0.3"
tracing = { workspace = true }
url = "2.5"
chrono = { workspace = true }
sha2 = { workspace = true }
hex = "0.4"
lru = "0.16"

# AWS S3
aws-sdk-s3 = { version = "1.125", optional = true }
aws-config = { version = "1.8", optional = true }

# Azure Blob Storage
azure_storage = { version = "0.21", optional = true }
azure_storage_blobs = { version = "0.21", optional = true }
azure_core = { version = "0.32", optional = true }

# Google Cloud Storage
google-cloud-storage = { version = "1.8", optional = true }
google-cloud-wkt = { version = "1", optional = true }
google-cloud-auth = { version = "1.6", default-features = false, optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
s3 = ["aws-sdk-s3", "aws-config"]
azure = ["azure_storage", "azure_storage_blobs", "azure_core"]
gcs = ["google-cloud-storage", "google-cloud-wkt", "google-cloud-auth"]
