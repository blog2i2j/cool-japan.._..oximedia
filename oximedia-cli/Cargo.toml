tokio.workspace = true
clap.workspace = true
ratatui.workspace = true
crossterm = "0.29"
indicatif = "0.18"
anyhow = "1"
tracing.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.9"
colored = "2"
rayon = "1.10"
chrono = "0.4"
humantime = "2"
dirs = "6"

[dev-dependencies]
tempfile = "3"
