[package]
name = "oximedia-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Command-line interface for OxiMedia"

[lints]
workspace = true

[[bin]]
name = "oximedia"
path = "src/main.rs"

[[bin]]
name = "oximedia-ff"
path = "src/bin/oximedia-ff.rs"

[dependencies]
oximedia-compat-ffmpeg.workspace = true
oximedia-plugin.workspace = true
