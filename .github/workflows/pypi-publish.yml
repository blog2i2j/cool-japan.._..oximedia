# PyPI Publishing Workflow for OxiMedia Python bindings
# Builds and publishes Python wheels to PyPI using maturin

name: PyPI Publish

on:
  # Manual trigger for publishing
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'Publish target'
        required: true
        default: 'pypi'
        type: choice
        options:
          - testpypi
          - pypi
          - none
      version_tag:
        description: 'Version tag (e.g., v0.1.0)'
        required: false
        type: string

  # Trigger on release tags
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  MATURIN_VERSION: "1.8.4"

jobs:
  # Build wheels for Linux x86_64 (host runner, no manylinux container)
  linux-x86_64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install protoc
        run: |
          curl -Lo /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip"
          sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc
          sudo chmod +x /usr/local/bin/protoc

      - name: Install Rust and maturin
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          pip install maturin==${{ env.MATURIN_VERSION }}

      - name: Build wheels
        run: |
          source "$HOME/.cargo/env"
          cd crates/oximedia-py
          maturin build --release --out dist --compatibility manylinux_2_34 --auditwheel skip

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64-py${{ matrix.python-version }}
          path: crates/oximedia-py/dist/

  # Build wheels for Linux aarch64 (native ARM runner, no manylinux container)
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install protoc
        run: |
          curl -Lo /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-aarch_64.zip"
          sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc
          sudo chmod +x /usr/local/bin/protoc

      - name: Install Rust and maturin
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          pip install maturin==${{ env.MATURIN_VERSION }}

      - name: Build wheels
        run: |
          source "$HOME/.cargo/env"
          cd crates/oximedia-py
          maturin build --release --out dist --compatibility manylinux_2_34 --auditwheel skip

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64-py${{ matrix.python-version }}
          path: crates/oximedia-py/dist/

  # Build wheels for macOS (x86_64 and arm64)
  macos:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: brew install protobuf

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          working-directory: crates/oximedia-py
          rust-toolchain: stable

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/oximedia-py/dist

  # Build wheels for Windows
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        shell: pwsh
        run: |
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\protoc.zip"
          Expand-Archive -Path "$env:TEMP\protoc.zip" -DestinationPath "$env:LOCALAPPDATA\protoc" -Force
          echo "$env:LOCALAPPDATA\protoc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --find-interpreter
          working-directory: crates/oximedia-py
          rust-toolchain: stable

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: crates/oximedia-py/dist

  # Build source distribution
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/oximedia-py
          rust-toolchain: stable

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/oximedia-py/dist

  # Publish to PyPI
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux-x86_64, linux-aarch64, macos, windows, sdist]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    environment:
      name: ${{ github.event.inputs.publish_target == 'pypi' && 'pypi' || 'testpypi' }}
      url: ${{ github.event.inputs.publish_target == 'pypi' && 'https://pypi.org/project/oximedia/' || 'https://test.pypi.org/project/oximedia/' }}
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List dist contents
        run: ls -la dist/

      # Publish to TestPyPI
      - name: Publish to TestPyPI
        if: github.event.inputs.publish_target == 'testpypi' || (github.event_name == 'push' && contains(github.ref, 'rc'))
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

      # Publish to PyPI
      - name: Publish to PyPI
        if: github.event.inputs.publish_target == 'pypi' || (github.event_name == 'push' && !contains(github.ref, 'rc'))
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
